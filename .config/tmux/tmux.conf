# keep default prefix (Ctrl + b)

# Terminal true color support
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Splits
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane management
bind x kill-pane
set -g mouse on
# Zoom the OTHER pane (hide current pane) instead of zooming current
bind z run-shell "tmux select-pane -t ':.{next}' && tmux resize-pane -Z"

# Vim-style pane navigation
bind h select-pane -L
bind l select-pane -R
bind j select-pane -D
bind k select-pane -U

# Session management
bind r command-prompt -I "#S" "rename-session '%%'"
bind K confirm-before -p "Kill ALL sessions? (y/n)" "kill-server"

# Pane borders
set -g pane-border-style fg=colour236
set -g pane-active-border-style fg=green
set -g pane-border-lines heavy

# Status bar
set -g status-style bg=green,fg=black,bold
set -g window-status-style fg=black,bg=green
set -g window-status-current-style fg=green,bg=black,bold
set -g window-status-current-format " #I:#W "
set -g window-status-format " #I:#W "
set -g status-left ""
set -g status-right ""

# Window auto-rename to current folder
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# Ghostty title bar — live current folder, refreshes every second
set -g status-interval 1
set -g set-titles on
set -g set-titles-string "#{b:pane_current_path}"
