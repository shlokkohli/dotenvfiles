# keep default prefix (Ctrl + b)

# Terminal true color support
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# vertical and horizontal splits
bind | split-window -h
bind _ split-window -v

# remove default bindings
unbind '"'
unbind %

# close pane instantly
bind x kill-pane

set -g mouse on

# vim-style pane navigation
bind h select-pane -L
bind l select-pane -R
bind j select-pane -D
bind k select-pane -U

# Inactive pane border (dull)
set -g pane-border-style fg=colour236

# Active pane border (bright green)
set -g pane-active-border-style fg=green

# Status bar — full green background
set -g status-style bg=green,fg=black,bold

# Inactive window tab
set -g window-status-style fg=black,bg=green

# Active window tab — inverted for contrast
set -g window-status-current-style fg=green,bg=black,bold

# Window tab format — only number and name
set -g window-status-current-format " #I:#W "
set -g window-status-format " #I:#W "

# Hide left and right status
set -g status-left ""
set -g status-right ""
